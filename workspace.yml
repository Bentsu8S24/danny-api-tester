opencollection: 1.0.0
info:
  name: "danny-api-tester"
  type: workspace

collections:
  - name: "BigData"
    path: "collections/BigData"
  - name: "NEW DEMP"
    path: "collections/NEW DEMP"

specs:

docs: |
  Workspace สำหรับทดสอบ API (Bruno/OpenCollection)

  ประกอบด้วย collections:
  - BigData: API ชุด Big Data (login, company, auditor, financial, GHG, project, ฯลฯ) — ใช้ cookies หลัง login
  - NEW DEMP: API ชุด DEMP (AUTH, Profile, Auditor Register, ฯลฯ)

  ใช้สำหรับรัน request, ตรวจ response และทดสอบ flow ระหว่าง dev/localhost/prod
